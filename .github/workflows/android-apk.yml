name: Build Android APK

on:
  workflow_dispatch: # This allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Fix Gradle Wrapper
        run: |
          mkdir temp-wrapper
          cd temp-wrapper
          touch settings.gradle
          gradle wrapper --gradle-version 8.14.3
          cp gradle/wrapper/gradle-wrapper.jar ../android/gradle/wrapper/
          cp gradle/wrapper/gradle-wrapper.properties ../android/gradle/wrapper/
          cd ..
          rm -rf temp-wrapper

      - name: Build APK with Gradle
        env:
          GRADLE_OPTS: -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

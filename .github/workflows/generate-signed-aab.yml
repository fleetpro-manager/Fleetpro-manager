name: Generate Signed Release AAB

on:
  workflow_dispatch: # This allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Fix Gradle Wrapper
        run: |
          mkdir temp-wrapper
          cd temp-wrapper
          touch settings.gradle
          gradle wrapper --gradle-version 8.14.3
          cp gradle/wrapper/gradle-wrapper.jar ../android/gradle/wrapper/
          cp gradle/wrapper/gradle-wrapper.properties ../android/gradle/wrapper/
          cd ..
          rm -rf temp-wrapper

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass mypassword123 -keypass mypassword123 -dname "CN=User, OU=App, O=Org, L=City, S=State, C=BD"

      - name: Build Release AAB
        env:
          GRADLE_OPTS: -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        run: |
          # Find the built AAB
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          # Sign it
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.keystore -storepass mypassword123 -keypass mypassword123 $AAB_PATH my-key-alias

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed.aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload Keystore (KEEP THIS SAFE!)
        uses: actions/upload-artifact@v4
        with:
          name: release.keystore
          path: release.keystore

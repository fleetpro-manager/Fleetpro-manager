<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00838f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" fill="url(#grad)" />
  
  <!-- Outer Glow Circle -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="16 12" opacity="0.4" />
  
  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.25" />

  <!-- Elegant Wings / Motion Lines (Left) -->
  <path d="M 120 220 L 170 240 L 125 250 Z M 100 256 L 160 270 L 110 286 Z" fill="#ffffff" opacity="0.7" />
  <!-- Elegant Wings / Motion Lines (Right) -->
  <path d="M 392 220 L 342 240 L 387 250 Z M 412 256 L 352 270 L 402 286 Z" fill="#ffffff" opacity="0.7" />

  <!-- Detailed Modern Cargo Truck Emblem -->
  <!-- Main Cabin (Right facing) -->
  <path d="M 280 180 
           L 340 180 
           C 355 180, 365 190, 370 205 
           L 385 245 
           C 390 255, 390 265, 380 265 
           L 280 265 
           Z" fill="#ffffff" />
  
  <!-- Cabin Window -->
  <path d="M 310 195 
           L 345 195 
           L 362 235 
           L 310 235 
           Z" fill="#00838f" />

  <!-- Cargo Box (Trailer) -->
  <rect x="140" y="165" width="132" height="100" rx="12" fill="#ffffff" />
  <!-- Cargo Texture Stripes for Modern Styling -->
  <line x1="165" y1="180" x2="165" y2="250" stroke="#00bcd4" stroke-width="6" stroke-linecap="round" />
  <line x1="195" y1="180" x2="195" y2="250" stroke="#00bcd4" stroke-width="6" stroke-linecap="round" />
  <line x1="225" y1="180" x2="225" y2="250" stroke="#00bcd4" stroke-width="6" stroke-linecap="round" />
  <line x1="255" y1="180" x2="255" y2="250" stroke="#00bcd4" stroke-width="6" stroke-linecap="round" />

  <!-- Connecting Joint -->
  <rect x="268" y="245" width="16" height="15" fill="#ffffff" opacity="0.9" />

  <!-- Wheels (Lower Truck Base) -->
  <!-- Under Carriage -->
  <rect x="160" y="265" width="200" height="12" fill="#ffffff" rx="6" opacity="0.8" />
  
  <!-- Wheel 1 -->
  <circle cx="185" cy="285" r="26" fill="#121212" stroke="#ffffff" stroke-width="6" />
  <circle cx="185" cy="285" r="10" fill="#ffffff" />
  
  <!-- Wheel 2 -->
  <circle cx="245" cy="285" r="26" fill="#121212" stroke="#ffffff" stroke-width="6" />
  <circle cx="245" cy="285" r="10" fill="#ffffff" />
  
  <!-- Wheel 3 -->
  <circle cx="330" cy="285" r="26" fill="#121212" stroke="#ffffff" stroke-width="6" />
  <circle cx="330" cy="285" r="10" fill="#ffffff" />

  <!-- Road Base Speed Line -->
  <path d="M 80 340 L 432 340" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  <path d="M 140 360 L 372 360" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.5" />
</svg>
